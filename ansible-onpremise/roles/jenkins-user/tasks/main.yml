---
# jenkins-user 역할: CI/CD 배포용 jenkins 계정 구성 (네이티브 모듈, 멱등)
# 기본 비활성: enable_jenkins=true 일 때만 실행. raw idiom 전면 제거.

- name: jenkins 그룹 생성
  ansible.builtin.group:
    name: "{{ jenkins_group }}"
    gid: "{{ jenkins_gid }}"
    state: present

- name: jenkins 사용자 생성
  ansible.builtin.user:
    name: "{{ jenkins_user }}"
    uid: "{{ jenkins_uid }}"
    group: "{{ jenkins_group }}"
    shell: "{{ jenkins_shell }}"
    home: "{{ jenkins_home }}"
    comment: "{{ jenkins_comment }}"
    create_home: true
    state: present

- name: docker 그룹 존재 확인
  ansible.builtin.getent:
    database: group
    key: docker
  register: jenkins_docker_group
  failed_when: false
  changed_when: false
  when: jenkins_add_to_docker | bool

- name: jenkins 사용자를 docker 그룹에 추가 (그룹 존재 시)
  ansible.builtin.user:
    name: "{{ jenkins_user }}"
    groups: docker
    append: true
  when:
    - jenkins_add_to_docker | bool
    - jenkins_docker_group.ansible_facts.getent_group is defined
    - "'docker' in jenkins_docker_group.ansible_facts.getent_group"

- name: jenkins .ssh 디렉토리 생성 (0700)
  ansible.builtin.file:
    path: "{{ jenkins_home }}/.ssh"
    state: directory
    owner: "{{ jenkins_user }}"
    group: "{{ jenkins_group }}"
    mode: "{{ jenkins_ssh_dir_mode }}"
  when: jenkins_create_ssh_dir | bool

- name: jenkins authorized_keys 생성 (0644, 정책 준수)
  ansible.builtin.file:
    path: "{{ jenkins_home }}/.ssh/authorized_keys"
    state: touch
    owner: "{{ jenkins_user }}"
    group: "{{ jenkins_group }}"
    mode: '0644'
    access_time: preserve
    modification_time: preserve
  when: jenkins_create_ssh_dir | bool

- name: jenkins sudoers 설정 (visudo 검증)
  ansible.builtin.template:
    src: jenkins-sudoers.j2
    dest: /etc/sudoers.d/jenkins
    owner: root
    group: root
    mode: '0440'
    validate: 'visudo -cf %s'
  when: jenkins_sudo_access | bool

- name: jenkins SSH 클라이언트 설정 (호스트 키 검사 비활성, 옵트인)
  ansible.builtin.copy:
    dest: "{{ jenkins_home }}/.ssh/config"
    owner: "{{ jenkins_user }}"
    group: "{{ jenkins_group }}"
    mode: '0600'
    content: |
      Host *
        StrictHostKeyChecking no
        UserKnownHostsFile /dev/null
        ServerAliveInterval 60
  when:
    - jenkins_configure_ssh_client | bool
    - jenkins_disable_host_key_checking | bool
