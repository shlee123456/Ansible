---
# llm 역할 기본값
# 환경별 차이는 group_vars/llm.yml 에서 덮어쓴다.

# 모델 저장 표준 경로
llm_models_dir: /media/llm-models

# 다운로드할 모델 목록 (group_vars 에서 정의)
# 형식: - { repo_id: org/name, dest: /경로 (선택) }
llm_models: []

# 모델 파일 소유자 (다운로드도 이 사용자로 수행)
llm_models_owner: "{{ ansible_user }}"

# HuggingFace 토큰 (vault 변수 참조, group_vars 에서 주입)
llm_hf_token: ""

# huggingface_hub CLI 전용 venv 경로
# Ubuntu 24.04 는 PEP 668 로 시스템 pip 설치가 막혀 있어 전용 venv 를 사용한다.
llm_hf_venv: /opt/huggingface/venv

# venv 준비용 apt 패키지
llm_python_packages:
  - python3-venv
  - python3-pip

# 다운로드 전 모델 디렉토리 파일시스템의 최소 여유 공간 (GB)
# gpt-oss-120b 급은 수백 GB 필요 → 루트 디스크 오염 사고 방지용 가드
llm_min_free_gb: 250

# true 면 완료 마커를 무시하고 재다운로드(이어받기/증분 동기화)
llm_force_download: false

# 다운로드 완료 마커 파일명 (모델 디렉토리 내)
llm_download_marker: .ansible_download_complete
