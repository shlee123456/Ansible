---
# llm 역할: HuggingFace 모델 다운로드 환경 구성 + 모델 동기화 (LLM 서빙 서버)
# scripts 저장소의 download_model.sh 를 Ansible 태스크로 이식한 것.
# 전제: 부트스트랩 완료(python3). 서빙(컨테이너 기동)은 서비스 소스 확정 후 추가 예정.
# 2회차 실행 시 changed=0 (완료 마커 가드, state: present, creates 사용).

# --- Python / huggingface CLI 환경 (PEP 668 대응: 전용 venv) ---

- name: Python venv 패키지 설치
  ansible.builtin.apt:
    name: "{{ llm_python_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: huggingface 전용 venv 생성
  ansible.builtin.command: python3 -m venv {{ llm_hf_venv }}
  args:
    creates: "{{ llm_hf_venv }}/bin/pip"

# hf_transfer 는 deprecated → Xet 고속 전송(hf_xet) 사용 (아래 다운로드 태스크 환경변수와 짝)
- name: huggingface_hub[hf_xet] 설치 (venv)
  ansible.builtin.pip:
    name: "huggingface_hub[hf_xet]"
    state: present
    virtualenv: "{{ llm_hf_venv }}"

# --- 모델 저장 경로 준비 (마운트/용량 사전 체크) ---

- name: 모델 디렉토리 생성
  ansible.builtin.file:
    path: "{{ llm_models_dir }}"
    state: directory
    owner: "{{ llm_models_owner }}"
    group: "{{ llm_models_owner }}"
    mode: '0755'

# 모델 디렉토리가 속한 파일시스템 정보 (어느 디스크에 쓰는지 가시화)
- name: 모델 디렉토리 파일시스템 확인 (findmnt)
  ansible.builtin.command: findmnt -n -o SOURCE,TARGET,AVAIL -T {{ llm_models_dir }}
  register: llm_fs_info
  changed_when: false
  check_mode: false

- name: 여유 공간 확인 (df, GB)
  ansible.builtin.shell: df -Pk {{ llm_models_dir }} | awk 'NR==2 {printf "%d", $4/1024/1024}'
  register: llm_free_gb
  changed_when: false
  check_mode: false

# 여유 공간 부족 시 다운로드 전에 중단 (루트 디스크 오염/디스크 풀 사고 방지)
- name: 디스크 여유 공간 가드
  ansible.builtin.assert:
    that:
      - (llm_free_gb.stdout | int) >= (llm_min_free_gb | int)
    fail_msg: >-
      {{ llm_models_dir }} 여유 공간 {{ llm_free_gb.stdout }}GB <
      최소 요구 {{ llm_min_free_gb }}GB.
      마운트 상태 확인 필요: {{ llm_fs_info.stdout }}
      (이미 다운로드 완료된 모델만 재검증하는 경우라면 -e llm_min_free_gb=0 으로 우회)
    success_msg: "{{ llm_models_dir }} ({{ llm_fs_info.stdout }}) 여유 {{ llm_free_gb.stdout }}GB — OK"

# --- 모델 다운로드 (완료 마커 기반 멱등) ---

# 강제 재동기화: 마커 제거 → 아래 다운로드가 다시 수행됨 (hf 는 증분/이어받기)
- name: 강제 재다운로드 시 완료 마커 제거
  ansible.builtin.file:
    path: "{{ item.dest | default(llm_models_dir ~ '/' ~ (item.repo_id | basename)) }}/{{ llm_download_marker }}"
    state: absent
  loop: "{{ llm_models }}"
  loop_control:
    label: "{{ item.repo_id }}"
  when: llm_force_download | bool

# 다운로드는 모델 소유자 권한으로 수행 (root 소유 파일 방지)
# 중단돼도 같은 태스크 재실행 시 이어받기 된다 (hf download 특성)
- name: 모델 다운로드 (hf download)
  ansible.builtin.command:
    argv:
      - "{{ llm_hf_venv }}/bin/hf"
      - download
      - "{{ item.repo_id }}"
      - --quiet
      - --local-dir
      - "{{ item.dest | default(llm_models_dir ~ '/' ~ (item.repo_id | basename)) }}"
    creates: "{{ item.dest | default(llm_models_dir ~ '/' ~ (item.repo_id | basename)) }}/{{ llm_download_marker }}"
  environment:
    HF_TOKEN: "{{ llm_hf_token }}"
    # Xet 고속 전송 (구 HF_HUB_ENABLE_HF_TRANSFER 는 deprecated)
    HF_XET_HIGH_PERFORMANCE: "1"
  become: false
  loop: "{{ llm_models }}"
  loop_control:
    label: "{{ item.repo_id }}"
  register: llm_download_result

# 다운로드가 실제 수행된 모델에만 완료 마커 생성
# (preserve 옵션으로 마커가 이미 있으면 changed=0 유지)
- name: 다운로드 완료 마커 생성
  ansible.builtin.file:
    path: "{{ item.dest | default(llm_models_dir ~ '/' ~ (item.repo_id | basename)) }}/{{ llm_download_marker }}"
    state: touch
    owner: "{{ llm_models_owner }}"
    group: "{{ llm_models_owner }}"
    mode: '0644'
    modification_time: preserve
    access_time: preserve
  loop: "{{ llm_models }}"
  loop_control:
    label: "{{ item.repo_id }}"

- name: 모델 디렉토리 사용량 출력
  ansible.builtin.command: du -h --max-depth=1 {{ llm_models_dir }}
  register: llm_du
  changed_when: false
  check_mode: false

- name: 모델 동기화 결과 출력
  ansible.builtin.debug:
    msg: "{{ llm_du.stdout_lines }}"
