---
- name: Configure Server
  hosts: servers
  gather_facts: no    # bootstrap 역할이 raw 로 시작하고 끝에서 setup 으로 facts 수집
  become: yes

  roles:
    # 1) Python 미설치 서버 부트스트랩 (python3/python3-apt 설치 + facts 수집)
    - bootstrap
    # 2) 이후는 네이티브 모듈 역할
    - common
    - docker
    # NVIDIA 드라이버 + Container Toolkit (GPU 미감지 호스트는 자동 스킵)
    - { role: nvidia, tags: [nvidia] }
    # GitHub 자격증명 배포 (비공개 레포 수동 clone 용, 토큰은 vault)
    - { role: git-credentials, tags: [git] }
    # 개인 작업 계정(shlee) + 공유 git 배포 키 (SSH clone 즉시 가능)
    - { role: dev-user, tags: [dev-user] }
    # ssh-keys / jenkins-user 는 옵트인 (태그 또는 -e 변수로 실행)
    - { role: ssh-keys, tags: [ssh-keys] }
    - { role: jenkins-user, tags: [jenkins], when: enable_jenkins | default(false) }

# LLM 서빙 서버 (llm 그룹): 모델 다운로드 환경 + 모델 동기화
# facts 불필요 태스크로 구성 → -t llm 단독 실행 가능
- name: Configure LLM Servers
  hosts: llm
  gather_facts: no
  become: yes

  roles:
    - { role: llm, tags: [llm] }

# 음성인식 서버 (stt 그룹): 골격 — 서버 입고·서비스 소스 확정 후 구체화
- name: Configure STT Servers
  hosts: stt
  gather_facts: no
  become: yes

  roles:
    - { role: stt, tags: [stt] }
