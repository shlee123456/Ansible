---
# common 역할: 기본 패키지 / 로케일 / 시간대 설정
# 전제: 부트스트랩 단계에서 python3 + python3-apt 가 이미 설치되어 있어야 한다
#       (플레이북 pre_tasks 의 raw 부트스트랩 참조).
# 모든 작업은 네이티브 모듈 사용 + 멱등성 보장 (2회차 실행 시 changed=0).
# Ubuntu / Debian (apt 계열) 공통으로 동작한다. RHEL 계열은 범위 밖.

# apt 캐시 갱신 (cache_valid_time 으로 불필요한 재갱신 방지 → 멱등)
- name: apt 캐시 갱신
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

# 시스템 기본 패키지 설치 (group_vars 의 system_packages 단일 소스 사용)
# name 에 리스트를 직접 전달하여 단일 트랜잭션으로 처리 (loop 보다 빠르고 멱등)
- name: 시스템 기본 패키지 설치
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

# 로케일 패키지 설치 (Debian/Ubuntu 공통 'locales' → locale-gen 제공)
# language-pack-ko 는 Ubuntu 전용이라 Debian 에서 깨지므로 사용하지 않는다.
- name: 로케일 패키지(locales) 설치
  ansible.builtin.apt:
    name: "{{ common_locales_package }}"
    state: present
  when: common_manage_locale | bool

# 로케일 생성 (community.general.locale_gen → 멱등, /etc/locale.gen 관리)
# locale-gen 을 raw 로 매번 호출하던 비멱등 방식을 대체한다.
- name: 로케일 생성 ({{ common_locale }})
  community.general.locale_gen:
    name: "{{ common_locale }}"
    state: present
  when: common_manage_locale | bool

# 시스템 기본 로케일을 /etc/default/locale 에 기록 (배포판 표준 방식, 멱등)
# /etc/environment 를 grep|echo 로 조작하던 비멱등 방식을 대체한다.
- name: 기본 로케일 설정 (/etc/default/locale)
  ansible.builtin.copy:
    dest: /etc/default/locale
    owner: root
    group: root
    mode: '0644'
    content: |
      LANG={{ common_locale }}
  when: common_manage_locale | bool

# 시간대 DB 패키지 설치 (tzdata). 최소 Ubuntu/Debian 이미지에는 없을 수 있어
# timezone 모듈이 'Asia/Seoul is not available' 로 실패하는 것을 방지한다.
- name: 시간대 DB 패키지(tzdata) 설치
  ansible.builtin.apt:
    name: tzdata
    state: present

# 시간대 설정 (/etc/localtime 심링크 + /etc/timezone 기록)
# community.general.timezone 은 일부 최소 이미지(ubuntu:24.04 등)에서 hwclock 실행파일을
# 요구해 실패한다. 심링크 방식은 tzdata 만 있으면 되고 systemd/hwclock 비의존이며
# Ubuntu/Debian 모두에서 멱등하게 동작한다.
- name: 시간대 설정 (/etc/localtime 심링크)
  ansible.builtin.file:
    src: "/usr/share/zoneinfo/{{ common_timezone }}"
    dest: /etc/localtime
    state: link
    force: true

- name: /etc/timezone 기록
  ansible.builtin.copy:
    dest: /etc/timezone
    content: "{{ common_timezone }}\n"
    owner: root
    group: root
    mode: '0644'
