---
# common 역할 기본값 (AWS)
# 우선순위: group_vars/all.yml > 이 파일.
# 역할 로직(tasks/main.yml)은 온프레미스와 동일하며, 차이는 변수로만 표현한다.

# 설치할 시스템 기본 패키지 목록 (group_vars 의 system_packages 가 단일 소스)
common_packages: "{{ system_packages | default(default_system_packages) }}"

# group_vars 가 없을 때 사용할 폴백 패키지 목록
default_system_packages:
  - vim
  - git
  - curl
  - htop
  - tree
  - net-tools
  - unzip
  - wget

# 로케일 / 시간대 (group_vars 가 우선)
# AWS 기본은 영문 로케일 (ko_KR 하드코딩 금지 — 감사 지적 반영)
common_locale: "{{ locale | default('en_US.UTF-8') }}"
common_timezone: "{{ timezone | default('Asia/Seoul') }}"

# 로케일 생성/적용 활성화 여부
common_manage_locale: true

# locales 패키지 (Debian/Ubuntu 공통, locale-gen 제공)
common_locales_package: locales
