---
- name: Ensure .ssh directory exists           # ssh 디렉토리 생성 후 권한 설정
  file:
    path: /home/ubuntu/.ssh
    state: directory
    mode: '0700'
    owner: ubuntu
    group: ubuntu

- name: Generate Ed25519 SSH key               # SSH 키 생성 
  openssh_keypair:
    path: /home/ubuntu/.ssh/id_ed25519
    type: ed25519
    owner: ubuntu
    group: ubuntu
    mode: '0600'

- name: Get public key content                # SSH 퍼블릭 키 생성
  command: cat /home/ubuntu/.ssh/id_ed25519.pub
  register: public_key_content
  changed_when: false

- name: Display public key
  debug:
    msg: "{{ public_key_content.stdout }}"
