[defaults]
# Python 인터프리터 경로
interpreter_python = /usr/bin/python3

# 호스트 키 확인 비활성화 (개발/테스트 환경)
host_key_checking = False

# SSH 연결 타임아웃 (초)
timeout = 30

# 재시도 파일 비활성화
retry_files_enabled = False

# 병렬 실행 포크 수
forks = 10

# 출력 색상 활성화
force_color = True

# Deprecation 경고 숨김
deprecation_warnings = False

# 로컬 roles/ 다음에 저장소 루트의 공유 roles/ 를 탐색 (bootstrap 등 공유 역할)
roles_path = roles:../roles

[ssh_connection]
# SSH 파이프라이닝 활성화 (성능 향상)
pipelining = True

# SSH 연결 재사용
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

[privilege_escalation]
# sudo 사용
become = True
become_method = sudo
become_user = root
become_ask_pass = False
