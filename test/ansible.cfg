[defaults]
# ── 테스트 하니스 전용 Ansible 설정 ──
# 프로덕션 ansible.cfg(ansible-onpremise/, ansible-aws/)와 분리하여
# 컨테이너 대상 검증에만 사용합니다.

# 부트스트랩으로 항상 /usr/bin/python3 가 설치되므로 인터프리터 고정
interpreter_python = /usr/bin/python3

# 컨테이너는 매번 새로 생성되므로 호스트 키 검사 불필요
host_key_checking = False

# 재시도 파일 비활성화
retry_files_enabled = False

# 멱등성 측정에 도움이 되는 태스크 타이밍/요약 콜백
callbacks_enabled = profile_tasks

# 본 프로젝트의 역할을 그대로 사용하기 위한 roles_path
# (저장소 루트 공유 roles[bootstrap] → 온프레미스 → AWS 순으로 검색)
# 주의: onprem/aws 의 common·docker·ssh-keys 는 동일 이름이므로 검색 우선순위상
#       항상 onpremise 사본이 로드된다. 두 환경의 역할 로직은 동일하게 유지하므로
#       멱등성·동작 검증에는 영향이 없다(차이는 group_vars/defaults 의 값뿐).
roles_path = ../roles:../ansible-onpremise/roles:../ansible-aws/roles

# Galaxy 컬렉션은 호스트 venv(ansible-onpremise)에 이미 설치된 것을 사용
# (community.docker, community.general)

# 불필요한 deprecation 경고 숨김
deprecation_warnings = False

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
