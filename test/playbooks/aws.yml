---
# ── AWS 플레이북 검증용 래퍼 ──
#
# 프로덕션 ansible-aws/playbook.yml 과 동일한 역할 구성(bootstrap → common → docker)을
# 그대로 실행합니다. 실서버(EC2 Ubuntu AMI)는 Python 이 사전 설치돼 bootstrap 이
# 사실상 skip 되지만, 본 하니스 컨테이너는 Python 미설치이므로 bootstrap 이 실제로
# 동작합니다. 역할 코드는 roles_path 로 공유 ../roles 및 ../ansible-aws/roles 에서 로드.

- name: AWS 서버 구성 검증
  hosts: aws
  gather_facts: false   # bootstrap 역할이 raw 로 시작하고 끝에서 setup 으로 facts 수집
  become: true

  roles:
    - bootstrap
    - { role: common, tags: [common] }
    - { role: docker, tags: [docker] }
