---
# ── 온프레미스 플레이북 검증용 래퍼 ──
#
# 프로덕션 ansible-onpremise/playbook.yml 과 동일한 역할 구성
# (bootstrap → common → ssh-keys → docker → nvidia → llm)을 그대로 실행합니다.
# 차이는 대상 호스트(test 인벤토리의 onprem 그룹)와, 컨테이너에 맞춘 var 조정뿐입니다.
# 검증 대상 코드(역할)는 roles_path 로 원본을 로드하므로 복사본이 없고
# 드리프트가 발생하지 않습니다.
#
# 부트스트랩: 공유 roles/bootstrap 이 raw 로 python3/python3-apt 를 설치하고 facts 를
# 수집합니다 → Python 미설치 컨테이너에서 LOCKED #2 패턴(프로덕션 경로)을 그대로 검증.
#
# 미커버 역할 (실제 vault 비밀·외부 서비스 필요 → 실서버 검증 전용):
#   - git-credentials : 실제 GitHub 토큰 + api.github.com 검증 필요
#   - dev-user        : vault 암호화 배포 키·비밀번호 해시 + GitHub SSH 인증 필요

- name: 온프레미스 서버 구성 검증
  hosts: onprem
  gather_facts: false   # bootstrap 역할이 raw 로 시작하고 끝에서 setup 으로 facts 수집
  become: true
  vars:
    manage_ssh_keys: true   # 하니스에서 ssh-keys 역할을 실제로 실행해 검증
    # llm 역할: 모델 다운로드(수백 GB·토큰 필요)는 제외하고 환경 구성만 검증
    llm_models: []          # 빈 목록 → venv/디렉토리/가드 로직만 실행
    llm_min_free_gb: 0      # 컨테이너 디스크가 작아도 가드 통과

  roles:
    - bootstrap
    - { role: common, tags: [common] }
    - { role: ssh-keys, tags: [ssh-keys] }
    - { role: docker, tags: [docker] }
    # GPU 없는 컨테이너에서 자동 스킵 경로 검증 (사전 패키지 + lspci 감지 로직)
    - { role: nvidia, tags: [nvidia] }
    # 프로덕션에선 llm 그룹 전용 플레이지만, 하니스에선 같은 호스트에서 검증
    - { role: llm, tags: [llm] }
