---
# ── Docker 테스트 하니스 인벤토리 ──
#
# community.docker.docker 연결 플러그인을 사용합니다.
#   - 컨테이너 안에 sshd / 비밀번호 / 키 주입이 전혀 필요 없습니다.
#   - 모듈은 docker exec 로 실행되며, raw 부트스트랩도 동일하게 동작합니다.
#   - run-tests.sh 가 생성하는 컨테이너 이름과 ansible_host 가 1:1 대응됩니다.
#
# 두 그룹으로 프로덕션 플레이북의 두 환경을 모사합니다.
#   - onprem_* : ansible_user=puzzle  (sudo 비밀번호 환경 모사, become 자체는 root exec)
#   - aws_*    : ansible_user=ubuntu  (NOPASSWD sudo 환경 모사)
#
# 참고: docker 연결 플러그인 사용 시 become 은 docker exec -u 로 처리되므로
#       비밀번호 입력(-k/-K)이 필요 없습니다. 이는 프로덕션 SSH 경로와 다른
#       지점이며, 본 하니스가 검증하는 것은 "역할 로직과 멱등성"입니다.

all:
  vars:
    # 모든 대상은 docker 연결 플러그인으로 접근
    ansible_connection: community.docker.docker
    # 부트스트랩 이후 항상 존재
    ansible_python_interpreter: /usr/bin/python3

  children:
    # 온프레미스 플레이북 검증 대상 (사용자 puzzle)
    onprem:
      vars:
        ansible_user: puzzle
      hosts:
        onprem-ubuntu2204:
          ansible_host: ans-test-onprem-ubuntu2204
        onprem-ubuntu2404:
          ansible_host: ans-test-onprem-ubuntu2404
        onprem-debian12:
          ansible_host: ans-test-onprem-debian12

    # AWS 플레이북 검증 대상 (사용자 ubuntu)
    aws:
      vars:
        ansible_user: ubuntu
      hosts:
        aws-ubuntu2204:
          ansible_host: ans-test-aws-ubuntu2204
        aws-ubuntu2404:
          ansible_host: ans-test-aws-ubuntu2404
        aws-debian12:
          ansible_host: ans-test-aws-debian12
